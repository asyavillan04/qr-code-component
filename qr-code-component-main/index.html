<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  
  <title>Frontend Mentor | QR code component</title>


  <style>
    .attribution { font-size: 0.6875rem; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>

  <link rel="stylesheet" href="https://fonts.google.com/specimen/Outfit">

  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="image-card">
  <img src="images\image-qr-code.png"
    alt="https://www.frontendmentor.io/"
    width="576"
    height="576"
    class="qr-code">
  <h2 class="text">Improve your front-end skills by building projects</h2>

  <p class="text">Scan the QR code to visit Frontend Mentor and take your coding skills to the next level</p>
</div>

  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="https://github.com/asyavillan04">Asya Villan</a>.
  </footer>

</body>
</html>
